<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>비밀번호 찾기</title>
	<link rel="stylesheet" th:href="@{/css/mem/ect_style.css}">
	<script th:src="@{/js/mem/mem.js}"></script>
</head>
<body>
<div style="margin-left: 30px;">
<form action="/searchPassProc" name="passproc" method="get">
	<div class="search-header">
		<h2>비밀번호 찾기</h2>
	</div>

	<div class="r-border"></div>

	<div class="searchDivForm">

		<div>
			<input type="text" name="name" value="" placeholder="이름을 입력해주세요">
		</div>
	
		<div>
			<input type="text" name="email" value="" placeholder="이메일을 입력해주세요">
		</div>
		
		<div>
			<input type="text" name="id" value="" placeholder="아이디를 입력해주세요">
		</div>

		<div>
			<input class="bt3" type="submit" value="PW찾기" onclick="return searchPass();"> 
			<input class="bt3" type="button" value="취소"
				onclick="window.close();">
		</div>

	</div>

</form>
</div>
</body>
</html>
