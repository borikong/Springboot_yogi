<!DOCTYPE html>
<html>
<head>
	<title>여행은 요기조기-작성</title>
	<th:block th:replace="board/common :: commonHead"></th:block>
</head>
<script>
	 function handleCheck() {
		if(!writeSave()){
			return false;
		}
		const mode = document.writeForm.mode.value;
		if(mode!='EDIT'){
			const confirmDelete = confirm("등록하시겠습니까?");
			if (confirmDelete) {
				return true;
			} else {
				return false;
			}
		}else{
			const boardNo = document.writeForm.no.value;
			const pass = document.writeForm.pass.value;
			const isValid = checkPassword(boardNo, pass);

			if (isValid) {
				const confirmDelete = confirm("수정하시겠습니까?");

				if (confirmDelete) {
					location.href = `/board/delete?boardNo=${boardNo}`;
				} else {
					return false;
				}
			} else {
				alert("비밀번호가 틀렸습니다!");
				return false;
			}
		}


	}
</script>
<body>
<div th:replace="/common/navbar"></div>

	<div class="board_wrap" style="position: relative; z-index: 1;">
		<!-- 전체를 감싸고 있는 div 생성 -->
		<div class="board_title">
			<strong>자유게시판</strong>
			<p>자유롭게 이용가능한 게시판입니다.</p>
		</div>
		<form th:action="@{/board/write}" method="post" name="writeForm" onsubmit="return handleCheck()">
			<div class="board_write_wrap">
				<!-- 타이틀 아래 영역(리스트, 페이지, 버튼) -->
				<div class="board_write">
					<!-- 문의게시판 전체 영역 -->
					<div class="title">
						<dl>
							<dt>제목</dt>
							<dd>
								<input type="text" placeholder="제목 입력" name="title" th:value="${mode=='EDIT'}?${board.title}:''">
							</dd>
						</dl>
					</div>
					<div class="info">
						<dl>
							<dt>작성자</dt>
							<dd th:if="${mode!='EDIT'}">
								<input type="text" placeholder="작성자 입력" name="writer" th:value="${session.loginID != null}?${session.loginID}:''">
							</dd>
							<dd th:if="${mode=='EDIT'}" th:text="${board.writer}">
							</dd>
							<span th:if="${mode=='EDIT'}">
								<input type="hidden" name="writer" th:value="${board.writer}">
							</span>
						</dl>
						<dl>
							<dt>비밀번호</dt>
							<dd>
								<input type="password" placeholder="비밀번호 입력" name="pass">
							</dd>
						</dl>
					</div>
					<div class="cont">
						<textarea placeholder="내용 입력" name="content" th:text="${mode=='EDIT'}?${board.content}:''"></textarea>
					</div>
				</div>
				<div th:if="${mode!='EDIT'}" class="bt_wrap">
					<!-- 등록 -->
					<input type="hidden" name="mode" th:value="NEW">
					<input type="submit" value="등록" class="on">
					<input type="button" value="취소" th:onclick="|location.href='@{/boardlist}'|">
				</div>
				<div th:if="${mode=='EDIT'}" class="bt_wrap">
					<input type="hidden" name="mode" th:value="EDIT">
					<input type="hidden" name="no" th:value="${mode=='EDIT'}?${board.no}:''">
					<!-- 수정 -->
					<input type="submit" value="수정" class="on">
					<input type="button" value="취소" th:onclick="|location.href='@{/board/detail(no=${board.no})}'|">
				</div>
			</div>
		</form>
	</div>
	<div th:replace="/common/footer"></div>
</body>
</html>
